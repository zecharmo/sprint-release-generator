[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    X-Content-Type-Options = "nosniff"

# Allow embedding in Squarespace via iframe
[[headers]]
  for = "/index.html"
  [headers.values]
    Content-Security-Policy = "frame-ancestors *"
